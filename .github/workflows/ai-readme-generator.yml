name: 🤖 AI-Powered README Generator

on:
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: 'Regenerate ALL READMEs?'
        required: false
        default: 'true'
  schedule:
    - cron: '0 2 * * 0'

permissions:
  contents: write

jobs:
  generate-readmes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub groq

      - name: Generate READMEs
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FORCE_REGENERATE: ${{ github.event.inputs.force_regenerate }}
        run: |
          python3 scripts/ai_readme_generator.py